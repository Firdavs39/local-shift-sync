name: Android APK Build

# Builds a debug APK that can be sideloaded onto any Android phone
# ("Install from unknown sources"). No Google Play, no signing key, no cost.
# Runs on:
#   * manual trigger (Actions tab → Run workflow)
#   * every push to main (so the latest APK is always available)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web (Capacitor target)
        run: npm run build:cap
        env:
          # Supabase keys are public (anon/publishable) — safe in client bundle.
          # Set these as repo secrets so the APK talks to prod.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: geotime-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Publish to a rolling "latest-android" release so non-technical users
      # have a stable download link instead of digging through Actions runs.
      - name: Publish to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-android
          name: GeoTime Android (latest)
          body: |
            Последняя сборка GeoTime для Android (debug).
            Скачайте `app-debug.apk` ниже и установите на телефон
            (нужно разрешить «Установка из неизвестных источников»).
            Собрано автоматически из ветки main.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
